name: pam-2026-p6-ifs23003
on:
  push:
    branches: [ main ] # Ganti 'main' jika nama branch utama Anda berbeda

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

      - name: Get dependencies
      run: flutter pub get

      - name: Build Web
      # Ganti 'NAMA_REPO' dengan nama repository Anda di GitHub
      run: flutter build web --release --base-href /NAMA_REPO/

      - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/web